spring:
  application:
    name: backend

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    resources:
      static-locations: file:uploads/
  mvc:
    static-path-pattern: /uploads/**

server:
  port: 8080

otp:
  demo-mode: true
  expiration-seconds: 130

mpis:
  ai:
    similarity-threshold: 0.65
    engine-url: ${MPIS_AI_ENGINE_URL}

  cache:
    dedup-window-seconds: 5

  jwt:
    secret: ${MPIS_JWT_SECRET}
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: ALWAYS

    prometheus:
      enabled: true