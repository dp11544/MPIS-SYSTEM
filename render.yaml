services:

  # Spring Boot Backend
  - type: web
    name: mpis-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: MPIS_AI_ENGINE_URL
        sync: false
      - key: MPIS_JWT_SECRET
        generateValue: true

  # Python AI Engine
  - type: web
    name: mpis-ai-engine
    runtime: docker
    dockerContext: ./ai-engine
    dockerfilePath: ./ai-engine/Dockerfile
    envVars:
      - key: MPIS_BACKEND_URL
        sync: false
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
